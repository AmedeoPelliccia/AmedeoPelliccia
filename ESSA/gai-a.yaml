# ─────────────────────────────────────────────
# Cross-Domain Conflict Resolution
# ─────────────────────────────────────────────
conflict_resolution:
  rule: strictest_wins
  description: >
    When a component serves multiple L3 branches, it carries ALL
    applicable certifications simultaneously. No standard is
    substituted or waived.
  example:
    component: "H₂ PEM fuel-cell stack"
    branches: [AMPEL, MARE-E]
    certifications:
      - { aspect: software, ampel: "DO-178C DAL A", mare_e: "IEC 61508 SIL 3", resolution: "Both" }
      - { aspect: hardware, ampel: "DO-254 DAL A", mare_e: "IEC 61508 SIL 3", resolution: "Both" }
      - { aspect: qms, ampel: "AS9100D", mare_e: "ISO 9001 + DNV-GL", resolution: "All three" }
      - { aspect: environmental, ampel: "DO-160G", mare_e: "DNV-GL Type Approval", resolution: "Both" }
      - { aspect: safety, ampel: "ARP 4761A", mare_e: "IMO FSA", resolution: "Both" }

