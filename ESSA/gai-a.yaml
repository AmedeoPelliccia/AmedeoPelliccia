# ─────────────────────────────────────────────
# Layer Architecture
# ─────────────────────────────────────────────
layer_architecture:
  - layer: L0
    name: "Root (GAI-A)"
    governance_scope: >
      Constitutional invariants, Gaia-X federation principles, safety-first
      doctrine, IDEALE six-pillar domain decomposition.

  - layer: L1
    name: "Trunk (AMAR)"
    governance_scope: >
      Mission authority, programme creation/approval, strategic roadmap,
      branching governance.

  - layer: L2
    name: "Trunk (AGGIX)"
    governance_scope: >
      Resource registry, canonical URI scheme, interaction verbs, policy
      gates, physical infrastructure (GAIA Grids).

  - layer: L3a
    name: "Branch (AMPEL)"
    governance_scope: >
      Aviation/aerospace lifecycle: design, certification, operation,
      retirement. OPT-IN internal structure. ATA chapter governance.

  - layer: L3b
    name: "Branch (MARE-E)"
    governance_scope: >
      Maritime engineering: vessel lifecycle, maritime safety, classification
      society compliance.

  - layer: L3c
    name: "Branch (GAIR-SPACE)"
    governance_scope: >
      Space and quantum: QAOS, NBT gates, GAIA constellation, launch
      systems, orbital mechanics.

  - layer: L3d
    name: "Cross-cutting (Robotics A+)"
    governance_scope: >
      Autonomous systems: UAVs, swarms, marine platforms, orbital robotics.
      Multi-parent — inherits constraints from served branches.

  - layer: L4
    name: "Leaves (Assemblies)"
    governance_scope: >
      Certified components, ATA chapters, profiles, sub-systems. Terminal
      certification evidence nodes.

# ─────────────────────────────────────────────
# The Eight Tree Rules
# ─────────────────────────────────────────────
tree_rules:
  - number: 1
    name: "Downward Propagation"
    statement: "A parent's constraints propagate to all descendants."
    formal: "∀ n ∈ Tree: constraints(n) ⊇ constraints(parent(n))"
    enforcement: automatic

  - number: 2
    name: "Monotonic Strengthening"
    statement: >
      Constraints may only be tightened, never weakened, as you descend
      the tree. Strictest-wins vertically.
    formal: "∀ n: strength(constraints(n)) ≥ strength(constraints(parent(n)))"
    enforcement: automatic

  - number: 3
    name: "Multi-Parent Union"
    statement: >
      A node with multiple parents carries the union of all parent
      constraints. Conflicts resolved by strictest-wins.
    formal: "∀ n with parents P₁…Pₖ: constraints(n) = ⋃ᵢ constraints(Pᵢ) ∪ own(n)"
    enforcement: automatic

  - number: 4
    name: "Upward Certification"
    statement: >
      Certification evidence flows upward. A branch is certified only
      when all its children are certified.
    formal: "certified(b) ⟺ ∀ leaf l ∈ descendants(b): certified(l)"
    enforcement: gate_check

  - number: 5
    name: "AMAR Branching Approval"
    statement: "New L3 branches require explicit AMAR (L1) approval."
    formal: "∀ new branch b: ∃ approval a ∈ AMAR: approves(a, b)"
    enforcement: manual_with_record

  - number: 6
    name: "Branch Template Instantiation"
    statement: >
      New branches are created by instantiating a branch template, not
      by ad-hoc construction.
    formal: "∀ new branch b: ∃ template t: instantiates(b, t)"
    enforcement: template_engine

  - number: 7
    name: "Durability (No Deletion)"
    statement: >
      No node may be deleted from the tree. Nodes may only be deprecated.
      Full history and traceability are preserved.
    formal: "∀ n: ¬deleted(n) ∧ (deprecated(n) ⟹ preserved(history(n)))"
    enforcement: automatic

  - number: 8
    name: "Reuse (No Copy — Only Linking)"
    statement: >
      Shared components must be linked, not copied. Changes propagate
      via AGGIX version-controlled URI scheme.
    formal: "∀ shared resource r: instances(r) = 1 ∧ ∀ consumer c: links_to(c, r)"
    enforcement: automatic

