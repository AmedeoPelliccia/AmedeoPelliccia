description: >
  AGGIX is the L2 trunk of the GAI-A governance tree. It provides a
  canonical resource registry with 10 typed resources, a globally unique
  URI scheme, 7 interaction verbs with policy gates, and GAIA Grids as
  the physical infrastructure substrate.

