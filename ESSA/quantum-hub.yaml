# ─────────────────────────────────────────────
# Functional Scope — Coordinated Service Families
# ─────────────────────────────────────────────
service_families:
  - id: SVC-QPU-ACCESS
    name: QPU Access Coordination
    description: >
      Scheduling, queue management, and provenance tagging for quantum
      processing requests originating from ACQUA L_C / L_Q boundaries.
    couples_to: [ACQUA.L_C, ACQUA.L_Q]

  - id: SVC-NBT-GATE
    name: NBT Gate Operations
    description: >
      Bridge and tunnel control for the Neural Network Bridging and Tunneling
      layer defined in the OPT-IN N-axis, including gate invariants
      INV-001 through INV-003.
    invariants: [INV-001, INV-002, INV-003]

  - id: SVC-QSN-PIPELINE
    name: QSN Pipeline Services
    description: >
      Execution coordination for Quantum Simplicial Neural Network inference,
      persistent homology computations, and topological evidence return paths.

  - id: SVC-BRIDGE
    name: Quantum-Classical Bridge Services
    description: >
      Temporal synchronization, simplicial state preparation, and tunnel-back
      registration into the classical PATH → MTL pipeline.

execution_disclaimer: >
  The Quantum HUB does not itself execute quantum computation. It coordinates,
  governs, and federates access to such execution.

