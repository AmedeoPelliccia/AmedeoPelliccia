description: >
  The Quantum HUB is the Naples-anchored operational coordination layer that
  binds ESSA quantum ecosystems — QPU access, NBT gate operations, Quantum
  Simplicial Neural Network (QSN) pipelines, and quantum-classical bridge
  services — into a single federated point of orchestration. It does not
  replace ACQUA's L_Q (Quantum Layer) or QQQ's regime theory; it is the
  physical and institutional locus through which their operational services
  are coordinated, monitored, and federated to sector implementations
  (AMPEL360 Q100, AMPEL360 Q10, GAIA-AIR / QAOS).

# ─────────────────────────────────────────────
# Governance — Naples-led jurisdictional posture
# ─────────────────────────────────────────────
governance:
  lead_location: "Naples, Campania, Italy"
  lead_jurisdiction: "Italy / European Union"
  regulatory_posture: >
    Naples-led governance; apply applicable municipal, Italian national,
    and EU requirements jointly. Where requirements overlap, the stricter
    safety or containment control governs.
  conflict_rule: stricter_control_governs
  applicable_layers:
    - municipal: "Comune di Napoli — local operational permits and zoning"
    - regional: "Regione Campania — regional safety and environmental rules"
    - national: "Italian Republic — national law and sector regulators"
    - supranational: "European Union — EU regulations, directives, and applicable acts"
  constitutional_subordination: >
    No municipal or national accommodation may weaken the ESSA Safety-First
    baseline or override QCSSA quantum-domain safety mandates. Naples-led
    governance is jurisdictionally specific but constitutionally subordinate
    to ESSA invariants (ESSA-CONST-001).

