description: >
  Registry of entities in the QCSAA (Quantum-Computing Safety, Assurance,
  Authority) range G10.970–G10.979. Each entry declares a permitted
  descriptive name, default containment state, owner stakeholder, evidence
  pointer, and (when applicable) the matching LC01 KNOT reference. The
  registry is governed by the G10.975 containment grammar and validated
  by tools/validators/validate_g10_975.py.

# ─────────────────────────────────────────────
# Naples-led jurisdictional posture
# ─────────────────────────────────────────────
governance:
  lead_location: "Naples, Campania, Italy"
  lead_jurisdiction: "Italy / European Union"
  regulatory_posture: >
    Naples-led governance; apply applicable Naples municipal, Italian
    national, and European Union requirements jointly. Where requirements
    overlap, the stricter safety or containment control governs.
  conflict_rule: stricter_control_governs
  enforcement_authority: STK-GOV

# ─────────────────────────────────────────────
# Allowed containment states (from G10.975 §3)
