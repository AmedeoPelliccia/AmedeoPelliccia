# ─────────────────────────────────────────────
# Prohibited names (controlled-prohibition list)
# Authored use permitted ONLY inside an explicit prohibition context.
# Enforced by BREX-G10.975-PROHIBITED-NAME and validate_g10_975.py.
# ─────────────────────────────────────────────
prohibited_names:
  - term: "monster"
    rationale: "Moral/sensational connotation; may quote only in prohibition context (G10.975 §4.4)."
  - term: "leviathan"
    rationale: "Personhood/mythic connotation; may quote only in prohibition context."
  - term: "chimera"
    rationale: "Mythic/personhood connotation; may quote only in prohibition context."
  - term: "demon"
    rationale: "Moral connotation; may quote only in prohibition context."
  - term: "abomination"
    rationale: "Moral connotation; may quote only in prohibition context."

