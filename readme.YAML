    standard_ref: "STD-OPTIN-001 v1.1"

  - id: PATH-MTL
    full_name: "PATH → MTL Pipeline"
    description: >
      Traceable pipeline (Prompting → Approved → Template → Heading →
      To Model → TEKNIA Ledger) governing artefact production, acceptance,
      registration, and reward.
    standard_ref: "STD-PATH-MTL-001 v1.0"

  - id: DWGE
    full_name: "Deterministic Widget Generator Engine"
    description: >
      Intent-lock layer normalizing raw prompts into locked intents before
      any procedure executes. The LLM proposes; the deterministic kernel
      disposes.
    standard_ref: "STD-PATH-MTL-001 §3.1a"
    widgets: 10
    gates: 8

  - id: TT
    full_name: "Teknia Tokens"
    version: "v3.14"
    description: >
      Native incentive instrument of the Economy pillar. Contributors are
      rewarded for reducing uncertainty: effort + impact, weighted and
      hash-chained.

  - id: NBT
    full_name: "NBT Gates (Neural Network Bridging and Tunneling)"
    description: >
      N-axis connections linking classical pipeline outputs to
      quantum-augmented simplicial manifolds via QSN inference.

