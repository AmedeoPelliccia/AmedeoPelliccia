description: >
  Formal specification for the ATA Constituent Framework (ATA-CFS).
  Defines the structural bridge from legacy ATA iSpec 2200 industrial chapter
  numbering to the scientific domain architecture (STD-OPTIN-SCI-001).
  Establishes naming rules, inheritance rules, traceability rules, and
  CI/CD validation hooks for Constituent Chapters (CC) and Constituent
  Chapter Articles (CCA).

