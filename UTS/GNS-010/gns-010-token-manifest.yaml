##############################################################################
# Operational Limits of Use
##############################################################################
limits_of_use:
  - code: "LoU-010-GNS-001"
    limit: "For SoL-dependent operations, applicable EGNOS service-status information shall be reviewed within the defined pre-flight planning window"
    enforcement: "Procedure recorded in GNS-010-EV-006"

  - code: "LoU-010-GNS-002"
    limit: "Dual-constellation capability is required only where imposed by the specific aircraft architecture, operational concept or approval basis"
    enforcement: "Traced in installation and approval data"

  - code: "LoU-010-GNS-003"
    limit: "OSNMA, where implemented, shall be treated as a cyber-resilience control and not as a substitute for certified navigation integrity"
    enforcement: "Linked to CYB_CONTROL-P120-OSNMA-001"

  - code: "LoU-010-GNS-004"
    limit: "Galileo HAS shall remain non-creditable for SoL guidance unless a separate explicit approval basis exists"
    enforcement: "Acceptance recorded in validation evidence"

  - code: "LoU-010-GNS-005"
    limit: "LPV / APV operations require compliance with the applicable approved alert-limit / protection-level criteria throughout the relevant operation segment"
    enforcement: "Real-time monitoring and defined go-around / reversion logic"

  - code: "LoU-010-GNS-006"
    limit: "Reversionary navigation means shall be defined and demonstrated where required by the operational approval basis"
    enforcement: "Integration evidence required"

  - code: "LoU-010-GNS-007"
    limit: "Software / firmware changes affecting GNSS functions shall trigger impact analysis and re-verification commensurate with the affected claim set"
    enforcement: "Configuration-management gate and token version increment"

