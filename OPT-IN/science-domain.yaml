##############################################################################
# OPT-IN Science Domain Architecture
# Machine-readable companion to OPT-IN/SCIENCE-DOMAIN.md
##############################################################################

document_id: STD-OPTIN-SCI-001
document_type: optin_science_domain_architecture
title: "OPT-IN Science Domain Architecture"
version: "1.0.0"
schema_version: "1.0.0"
status: normative_draft
standard: STD-OPTIN-001
parent: STD-OPTIN-001
last_updated: "2026-03-11T00:00:00Z"

description: >
  Formalises Science as a domain within the OPT-IN 5-axis topology (O–P–T–I–N)
  and decomposes it into seven subdomains. Each subdomain instantiates the five
  axes with domain-specific content and maps to one or more IDEALE pillars.
  Science is the generative substrate of all IDEALE pillars: it does not sit
  alongside them but underlies all of them.

related_documents:
  - id: STD-PATH-MTL-001
    role: artefact production pipeline that science outputs must traverse
  - id: ESSA-CONST-001
    role: constitutional constraints inherited by all OPT-IN domains
  - id: ESSA-DOC-AMPEL360-001
    role: lifecycle engine consuming science artefacts for aerospace programmes
  - id: EACST-STD-CCTLS-001
    role: certification lifecycle standard governing science evidence tokens

# ─────────────────────────────────────────────
# Domain-Level OPT-IN Axis Instantiation
# ─────────────────────────────────────────────
optin_axes:
  O_organizations:
    description: >
      Research institutions, national laboratories, EU agencies, universities,
      industry R&D consortia, and standards bodies operating in Science domains.
    examples:
      - CERN
      - ECMWF
      - ESA
      - DLR
      - INRIA
      - Fraunhofer
      - EU Quantum Flagship consortia
      - Joint Research Centre (JRC)

  P_programs:
    description: >
      Research and funding programmes that instantiate Science domain activities.
    examples:
      - Horizon Europe
      - EIC Accelerator
      - ERC Grants
      - EU Quantum Flagship
      - Clean Aviation JU
      - Destination Earth
      - DEP (Digital Europe Programme)
      - Copernicus Climate Change Service

  T_technologies:
    description: >
      Scientific methods, tools, and technologies used across Science subdomains.
    examples:
      - Quantum computing (variational algorithms, error correction)
      - AI/ML-augmented discovery and literature review
      - Climate reanalysis models
      - Composite and additive manufacturing
      - Formal verification methods
      - FAIR data tools
      - Bioinformatics pipelines

  I_infrastructures:
    description: >
      Physical and digital research infrastructures enabling Science domain work.
    examples:
      - EuroHPC JU (high-performance computing)
      - EOSC (European Open Science Cloud)
      - ELIXIR (life science data infrastructure)
      - CESSDA (social science data infrastructure)
      - Copernicus DIAS
      - ESAC data archives
      - EMMC materials modelling platform

  N_neural_networks:
    description: >
      AI-augmented, quantum-enhanced, and NBT-gate-connected computational
      layers that amplify Science domain discovery and inference.
    examples:
      - NBT gates bridging QSN outputs to ESSA pipeline
      - Quantum-accelerated simulation (chemistry, materials, fluids)
      - AI-assisted astrophysical data reduction
      - Foundation model governance under DWGE
      - Agent-based social simulation
      - Biosignal processing via QSN inference

# ─────────────────────────────────────────────
# Science Subdomains
# ─────────────────────────────────────────────
subdomains:

  - id: SCI-01
    name: "Quantum Science & Technology"
    tli_file: "sci-01-quantum-TLI.yaml"
    ideale_pillars_primary:
      - A   # Aerospace
      - I   # Information
      - D   # Defense
    ideale_pillars_secondary:
      - E   # Energy
    optin_instantiation:
      O: "CERN, NIST, Fraunhofer IAF, IQM, QuTech, EU Quantum Flagship consortia"
      P: "EU Quantum Flagship, EIC Accelerator Quantum Track, AQUA-V programme"
      T: "Variational quantum algorithms, error correction, QSN inference, quantum sensing arrays"
      I: "EuroHPC quantum partitions, HPCQS QPU access, quantum-classical hybrid clusters"
      N: "NBT gates bridging QSN outputs to classical ESSA pipeline; quantum-augmented manifold computation"
    cross_pillar_impact:
      A: "Quantum simulation of structural mechanics and propulsion fluid dynamics"
      I: "Quantum-encrypted data sovereignty for CSDB and digital product passports"
      D: "Quantum-secure communications for dual-use systems"

  - id: SCI-02
    name: "Climate & Earth Science"
    tli_file: "sci-02-climate-earth-TLI.yaml"
    ideale_pillars_primary:
      - E   # Energy
      - A   # Aerospace
      - L   # Logistics
    ideale_pillars_secondary:
      - I   # Information
    optin_instantiation:
      O: "ECMWF, Copernicus programme, ESA EO, IPCC, national meteorological services"
      P: "EU Mission on Adaptation to Climate Change, Destination Earth, Copernicus CCS"
      T: "Climate reanalysis models, Earth observation data fusion, atmospheric emission tracking"
      I: "Copernicus DIAS, EOSC climate data spaces, EuroHPC Destination Earth infrastructure"
      N: "AI-augmented climate pattern recognition, NBT-enhanced atmospheric state inference"
    cross_pillar_impact:
      E: "Climate impact functions embedded in TLAR energy balance nodes"
      A: "Operational envelope constraints (wind, temperature, icing) for AMPEL360 Q100"
      L: "Climate-adjusted supply chain routing and LH2 distribution logistics"

  - id: SCI-03
    name: "Life Sciences & Biotechnology"
    tli_file: "sci-03-life-sciences-TLI.yaml"
    ideale_pillars_primary:
      - E   # Energy (bio-energy)
      - L   # Logistics (bio-supply chains)
      - E2  # Economy (bio-innovation assets)
    ideale_pillars_secondary:
      - A   # Aerospace (human factors)
    optin_instantiation:
      O: "EMA, ECDC, EMBL, biotech consortia, aerospace human factors institutes"
      P: "EU4Health, Innovative Health Initiative, crew health programmes, biomimetics research"
      T: "Genomics, bioinformatics, human-systems integration (HSI) methods, biosensor arrays"
      I: "ELIXIR research infrastructure, European Genome-phenome Archive, human factors test labs"
      N: "AI-assisted drug discovery, biosignal processing via QSN inference, cognitive load modelling"
    cross_pillar_impact:
      A: "Crew health and human factors in cockpit design (ATA 25, 35) and AMPEL360 Q100 life support"
      L: "Bio-inspired supply chain optimisation and circular economy material cycles"
      E2: "Biotechnology contribution assets in evidence markets"

  - id: SCI-04
    name: "Materials Science & Engineering"
    tli_file: "sci-04-materials-TLI.yaml"
    ideale_pillars_primary:
      - A   # Aerospace
      - E   # Energy
      - L   # Logistics
    ideale_pillars_secondary:
      - D   # Defense
    optin_instantiation:
      O: "DLR, ONERA, CIRA, materials research institutes, Airbus Research, Fraunhofer"
      P: "Clean Aviation JU, Key Enabling Technologies (KETs) programme, Materials 2030"
      T: "Composite manufacturing, additive manufacturing, materials modelling (DFT, MD), NDT"
      I: "European Materials Modelling Council (EMMC) platform, EUDAT research data infrastructure"
      N: "AI-driven materials discovery, ML interatomic potentials, quantum chemistry simulation"
    cross_pillar_impact:
      A: "Structural materials for AMPEL360 Q100 BWB airframe (ATA 51-57) and LH2 tanks"
