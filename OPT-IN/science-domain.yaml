    cross_pillar_impact:
      E2: "Capillary Merit Index (CMI), Teknia Token incentive design, evidence market governance"
      L: "Supply chain social risk modelling, ESG Social enforcement (S pillar)"
      I: "Human factors in information architecture and governance system design"

# ─────────────────────────────────────────────
# Cross-Domain Governance
# ─────────────────────────────────────────────
governance:

  path_to_mtl_integration:
    description: >
      Scientific artefacts entering a downstream IDEALE programme must traverse
      the PATH -> MTL pipeline with full OPT-IN axis anchoring.
    steps:
      - step: 1
        name: DWGE intent-lock
        description: Semantic normalisation of scientific output into locked intent
      - step: 2
        name: Template assignment
        description: Mapping to ATA chapter, lifecycle phase, or IDEALE pillar node
      - step: 3
        name: Artefact heading
        description: Traceability to OPT-IN axis instantiation and Science subdomain ID
      - step: 4
        name: Evidence gate
        description: INV-001 check — must cite K_full(t); INV-003 requires evidence_refs + approvals
      - step: 5
        name: Model update
        description: Delta knowledge and delta uncertainty registered against subdomain
      - step: 6
        name: TEKNIA ledger
        description: Contribution attributed (C1-C6), TT reward minted, hash-chained

  contribution_taxonomy:
    reference: contributions-registry.yaml
    types:
      - code: C1
        label: Direct co-authorship
        example: "Joint paper on QSN architectures"
      - code: C2
        label: Conceptual inspiration
        example: "Climate model feeding TLAR node"
      - code: C3
        label: Licensed dataset
        example: "EuroHPC benchmark results"
      - code: C4
        label: Public domain reference
        example: "IPCC climate scenario data"
      - code: C5
        label: Tool / method reuse
        example: "Open-source materials modelling code"
      - code: C6
        label: Review / validation
        example: "Peer review of quantum algorithm"

  esg_enforcement:
    E_environment:
      mechanism: >
        Climate impact scoring for research infrastructure (HPC energy use);
        lifecycle assessment for materials research outputs; LCA-linked DPP entries.
    S_social:
      mechanism: >
        Capillary Merit Index (CMI) for researchers; fair attribution under C1-C6 taxonomy;
        open access mandate compliance; Teknia Token reward proportional to verified impact.
    G_governance:
      mechanism: >
        Deterministic governance via DWGE; hash-chained evidence in TEKNIA ledger;
        monotonic safety invariants (INV-001, INV-002, INV-003); ESSA constitutional constraints.

  invariants:
    - id: SCI-INV-001
      statement: >
        Science domain artefacts entering PATH -> MTL must be anchored to at least one
        OPT-IN axis instantiation and carry an admissibility classification (C1-C6).
    - id: SCI-INV-002
      statement: >
        No science evidence may update a downstream IDEALE baseline without a closed
        evidence gate (INV-003: evidence_refs + approvals + run_manifest_ref).
    - id: SCI-INV-003
      statement: >
        Science subdomains may inform sector profiles but cannot weaken ESSA baseline
        constraints; all sector profile tightening is monotonic and non-reversible
        without a regulatory_event_id and signed_approval.

  governance_boundary:
    enters_ideale_through:
      - evidence packages
      - qualified models
      - certified datasets
      - contribution assets (C1-C6)
    must_not_bypass:
      - PATH -> MTL pipeline
      - DWGE intent-lock layer
      - ESSA constitutional constraints
    governed_by:
      - STD-OPTIN-001
      - ESSA-CONST-001
      - EACST-STD-CCTLS-001

# ─────────────────────────────────────────────
# Pillar Impact Matrix (machine-readable)
# ─────────────────────────────────────────────
pillar_impact_matrix:
  # primary = true, secondary = false, none = absent
  columns: [I, D, E, A, L, E2]
  rows:
    SCI-01: { I: primary, D: primary, E: secondary, A: primary, L: none,      E2: none    }
    SCI-02: { I: secondary, D: none, E: primary, A: primary, L: primary,  E2: none    }
    SCI-03: { I: none,      D: none, E: primary, A: secondary, L: primary, E2: primary }
    SCI-04: { I: none,      D: secondary, E: primary, A: primary, L: primary, E2: none }
    SCI-05: { I: primary,   D: primary, E: none,    A: primary, L: none,      E2: secondary }
    SCI-06: { I: primary,   D: primary, E: none,    A: primary, L: none,      E2: secondary }
    SCI-07: { I: primary,   D: secondary, E: none,  A: none,    L: primary,   E2: primary }
