##############################################################################
# 0  Core Principle
##############################################################################

core_principle:
  statement: >
    Cognitive continuity does not always require stable memory.
    It can depend on the stability of the regeneration rules.
  axioms:
    - id: E1
      name: Ephemeral Assembly
      description: >
        Cognitive continuity does not always require stable memory.
        It can depend on the stability of the regeneration rules.
    - id: E2
      name: Minimal Persistence
      description: >
        It is not necessary to preserve the entire structure; it suffices to
        preserve what allows the reconstruction of a functionally equivalent
        structure.
    - id: E3
      name: Multimodal Reactivation
      description: >
        Reactivation stimuli are not scalar. They are multimodal and may arrive
        from any sensory channel or from a cooperative sum of weak channels.

##############################################################################
# 1  Definitions
##############################################################################

definitions:

  - definition: 40
    name: Ephemeral Generative Interface
    description: >
      A temporary structure assembled by an AI system to mediate cognition,
      visualization, or inference during a task, without requiring full
      persistence of the object.

  - definition: 41
    name: Imaginary Simplicial Extension
    description: >
      A higher-order relational structure—not only nodes and edges, but
      relations of superior order—temporarily constructed to operate on
      complex contexts without permanent archival obligation.
      Imaginary means: internally generated, operative, and causally effective.

  - definition: 42
    name: Residual Trace
    description: >
      The minimal footprint left after an ephemeral interface decays: a seed,
      a signature, or a functional fingerprint sufficient to enable future
      reconstruction under compatible stimuli.

  # ----------------------------------------------------------------------------
  # Compatibility definitions (38, 39)
  # Retained to preserve contiguous global MCC numbering across SPEC-008
  # (Def 35), SPEC-009 (Defs 36–37), and SPEC-010 (Defs 40–42), and to give
  # legacy references in README.md a precise anchor. The operative definitions
  # of this specification remain 40–42.
  # ----------------------------------------------------------------------------

  - definition: 38
    name: Ephemeron
    status: compatibility
    legacy: true
    description: >
      Legacy name for an instance of an Ephemeral Generative Interface
      (Definition 40): a dynamically generated, time-varying sensory surface
      ε(t) that exists only for the duration of a task. In the present model
      an Ephemeron corresponds to the assembled object I_t produced by
      Assemble(s, z, K).
    maps_to: I_t

  - definition: 39
    name: Generation Function
    status: compatibility
    legacy: true
    description: >
      Legacy parameterised assembly map 𝒢(σ, π, t) → ε(t). Under the present
      model it factors as: σ ≡ z (latent seed); π ≡ payload bound into K
      (the temporary simplicial structure); t ≡ stimulus / lifecycle clock
      driving Assemble → Use → Decay. Operationally,
      𝒢(σ, π, t) ≡ Assemble(s, z, K) followed by the Use phase.
    maps_to: "Assemble(s, z, K) + Use phase"

##############################################################################
# 2  Lifecycle
##############################################################################

lifecycle:
  phases:
    - order: 1
      name: Stimulus
      description: "A relevant stimulus appears"
    - order: 2
      name: Assembly
      description: "The system constructs the temporary interface"
    - order: 3
      name: Use
      description: "The interface serves to visualize, organize, or infer"
    - order: 4
      name: Decay
      description: "The structure dissolves"
    - order: 5
      name: Residual Trace
      description: "A minimal trace remains"
    - order: 6
      name: Reactivation
      description: "A compatible stimulus permits reconstruction"

##############################################################################
# 3  Formal Model
##############################################################################

formal_model:

  core:
    assembly: "I_t = Assemble(s, z, K)"
    decay: "Decay(I_t) -> r"
    reactivation: "I_t' = Reactivate(s', r)"
    variables:
      s: "stimulus"
      z: "latent seed"
      K: "temporary simplicial structure"
      I_t: "ephemeral interface"
      r: "residual trace"

  cost_extension:
    assembly_cost: "C_a"
    decay_cost: "C_d"
    reactivation_cost: "C_r"
    constraint: "C_r <= C_a only if sim(s, s') > θ"

  activation_function:
    formula: "A(s, r) = Σ_c (s_c · α_c)"
    condition: "I_t' = Reactivate(s, r) iff A(s, r) > θ"
    parameters:
      alpha_c: "affinity of channel c with the given trace"
      theta: "reactivation threshold"

##############################################################################
# 4  Multimodal Stimulus
##############################################################################

stimulus_vector:
  formula: "s = (s_V, s_A, s_O, s_T, s_G, s_P)"
  channels:
    - symbol: V
      name: Visual
    - symbol: A
      name: Auditory
    - symbol: O
      name: Olfactory
    - symbol: T
      name: Tactile
    - symbol: G
      name: Gustatory
    - symbol: P
      name: Proprioceptive

##############################################################################
# 5  Reactivation Geometries
##############################################################################

reactivation_geometries:
  - channel: Olfactory
    geometry: Point
    reactivates: "context + valence"
  - channel: Auditory
    geometry: Path
    reactivates: "temporal trajectory"
  - channel: Visual
    subtype: "face/social-visual"
    geometry: Star
    reactivates: "relational network"
  - channel: Tactile
    geometry: Chain
    reactivates: "procedural sequence"
  - channel: Proprioceptive
    geometry: Manifold
    reactivates: "bodily/spatial configuration"
  - channel: Gustatory
    geometry: "Point + affect"
    reactivates: "chemical state + valence"

residual_trace_types:
  - r_point
  - r_path
  - r_star
  - r_chain
  - r_manifold

##############################################################################
# 6  SCI — Sensorium Compression Index
##############################################################################

sci:
  formula: "SCI = (V, A, O, T, G, P | Σ)"
  codecs:
    - channel: Visual
      data_nature: "spatial / relational"
      codec: ["embedding", "graph_hash", "point_cloud_hash"]
    - channel: Auditory
      data_nature: "temporal / sequential"
      codec: ["melodic_contour", "spectral_envelope"]
    - channel: Olfactory
      data_nature: "chemical / categorical"
      codec: ["molecular_fingerprint"]
    - channel: Tactile
      data_nature: "procedural / ordered"
      codec: ["action_grammar", "pressure_map_hash"]
    - channel: Gustatory
      data_nature: "chemical / valence"
      codec: ["chemical_snapshot", "valence_intensity"]
    - channel: Proprioceptive
      data_nature: "spatial / continuous"
      codec: ["pose_skeleton", "motion_trajectory"]
    - channel: Topological
      data_nature: "higher-order relational"
      codec: ["betti_numbers", "euler_characteristic"]

##############################################################################
# 7  Robotic SENSORIUM Transducers
##############################################################################

robotic_sensorium:
  vision:
    - "RGB camera"
    - "LiDAR / ToF"
    - "thermal IR"
    - "event camera"
  hearing:
    - "MEMS microphones"
    - "accelerometers"
    - "acoustic emission sensors"
    - "ultrasound"
  smell:
    - "electronic nose"
    - "PID"
    - "electrochemical sensors"
    - "spectrometry"
  touch:
    - "capacitive skin"
    - "force-torque sensors"
    - "piezoelectric sensors"
    - "thermistors"
  taste:
    - "ion-selective probes"
    - "conductivity sensors"
    - "voltammetric sensors"
  proprioception:
    - "encoders"
    - "IMU"
    - "motor current sensors"
    - "strain sensors"

##############################################################################
# 8  Shared Database Schema
##############################################################################

database_schema:
  minimal_fields:
    - id
    - stimulus.trigger_patterns
    - reconstruction.seed_reference
    - simplicial_signature
    - reconstruction.assembly_rules
    - persistence.decay_policy
    - reactivation
    - provenance

  example_instance:
    id: "EGI-001"
    title: "Ephemeral Generative Interface"
    status: "proposed"
    stimulus:
      trigger_patterns:
        - "music phrase"
        - "face recognition"
        - "olfactory signature"
        - "touch sequence"
      activation_threshold: 0.40
    reconstruction:
      seed_reference: "latent_seed://egi/001"
      assembly_rules:
        - "instantiate temporary nodes"
        - "construct higher-order relations"
        - "project to operational layer"
    simplicial_signature:
      max_dimension: 4
      betti_numbers: [1, 0, 0]
      euler_characteristic: 1
      mode: "path"
    persistence:
      store_full_interface: false
      residual_trace: true
      decay_policy: "time_or_task_completion"
    reactivation:
      channel_affinity:
        visual: 0.30
        auditory: 0.80
        olfactory: 0.60
        tactile: 0.20
        gustatory: 0.00
        proprioceptive: 0.10
      cross_channel_boost: true
    provenance:
      generating_model: "model_id"
      generation_timestamp: "2026-02-25T00:00:00Z"
      validation_status: "self_validated"

##############################################################################
# 9  Schema Compatibility
#
# This block exists so that consumers written against the pre-1.0.0 schema can
# detect the schema change explicitly rather than fail on missing keys.
# It documents which top-level keys were removed in this version and where
# their content was relocated. The deprecated stubs intentionally carry no
# semantic payload — they only point to their replacement section.
##############################################################################

schema_compatibility:
  current_schema_version: "1.0.0"
  previous_schema_version: "pre-1.0.0 (unversioned)"
  policy: >
    Removed top-level keys are kept below as deprecated stubs for one major
    version. Tooling SHOULD treat the presence of a `deprecated: true` marker
    as a non-fatal signal and read the `replaced_by` pointer instead. The
    schema version at which each stub was removed is given by
    `current_schema_version` above; per-stub `removed_in_schema_version`
    fields are intentionally omitted to keep a single source of truth.
  notes:
    - >
      The legacy "three-layer stack" framing (SENSORIUM / TRAUMACODEDRAMA /
      EGI) is preserved at the series level in AEROSPACEMODEL/MCC/README.md;
      it is no longer duplicated inside this document.
    - >
      The legacy "encoding_rules" and "decoder_protocol" sections were
      EGI-specific phase contracts (Nucleation / Bloom / Dissolution with a
      CRC / terminal-zero footer). Their lifecycle content is now captured in
      `lifecycle.phases` and `formal_model`; their integrity content is
      captured in `formal_model.activation_function` and the residual trace
      semantics. For bit-exact CRC integrity, see SPEC-009
      (TRAUMACODEDRAMA) Rule D-004 — Katharsis CRC, which EGI does not
      override.
    - >
      Definition numbers 38 (Ephemeron) and 39 (Generation Function) are kept
      in `definitions` above as compatibility entries to avoid a numbering
      gap between SPEC-009 (Def 37) and SPEC-010 (Def 40).

  construct_mapping:
    - legacy: "Ephemeron"
      current: "I_t (assembled ephemeral interface)"
      reference: "formal_model.core.assembly"
    - legacy: "Generation Function 𝒢(σ, π, t) → ε(t)"
      current: "Assemble(s, z, K) + Use phase"
      reference: "formal_model.core, lifecycle.phases"
    - legacy: "Phase: Nucleation (header, seed in onset)"
      current: "Phases: Stimulus + Assembly"
      reference: "lifecycle.phases[0..1]"
    - legacy: "Phase: Bloom (payload π_k = f(ε(t_k)))"
      current: "Phase: Use"
      reference: "lifecycle.phases[2]"
    - legacy: "Phase: Dissolution (footer, CRC, terminal zero)"
      current: "Phases: Decay + Residual Trace"
      reference: "lifecycle.phases[3..4]"
    - legacy: "Φ-modes: Φ_𝕆, Φ_𝔸, Φ_ℍ, Φ_𝔽𝔾, Φ_ℙ, Φ_★"
      current: "stimulus_vector.channels and sci.codecs"
      reference: "stimulus_vector, sci"
    - legacy: "CRC / terminal-zero integrity contract"
      current: "Residual trace r + activation threshold A(s,r) > θ"
      reference: "formal_model.activation_function"

  deprecated_stubs:

    encoding_rules:
      deprecated: true
      replaced_by:
        - "lifecycle.phases"
        - "formal_model"
        - "formal_model.activation_function"
      note: >
        Previously held EGI-specific phase encoding rules
        (Nucleation header / Bloom payload / Dissolution footer). The
        lifecycle is now described in `lifecycle.phases`; the formal
        encoding/decoding semantics live in `formal_model`. For bit-exact
        CRC rules, see SPEC-009 traumacodedrama.yaml `encoding_rules`.

    decoder_protocol:
      deprecated: true
      replaced_by:
        - "formal_model.core.reactivation"
        - "formal_model.activation_function"
        - "database_schema"
      note: >
        Previously specified the step-by-step decoder for an EGI payload.
        Decoding is now modelled as Reactivate(s', r) gated by
        A(s, r) > θ; reconstruction inputs are documented in
        `database_schema.example_instance.reconstruction`.

    three_layer_stack:
      deprecated: true
      replaced_by:
        - "AEROSPACEMODEL/MCC/README.md (series-level overview)"
      note: >
        The orthogonal three-layer framing (SENSORIUM intensity /
        TRAUMACODEDRAMA transitions / EGI lifecycle) is documented once at
        the series level in README.md and is no longer duplicated inside
        this specification.
