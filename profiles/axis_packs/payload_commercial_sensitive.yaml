# ──────────────────────────────────────────────────────────────────────────────
# AMPEL360 — Axis Pack: PAYLOAD = COMMERCIAL_SENSITIVE
# Business-confidential, limited disclosure
# Ref: AMPEL360-ARCH-SPEC-v2.0 §9.3, §9.6
# ──────────────────────────────────────────────────────────────────────────────

axis: payload_classification
value: COMMERCIAL_SENSITIVE
description: >
  Business-confidential, limited disclosure. Redacted evidence
  disclosure. Query relaxation permitted within tenant.

constraints:
  disclosure_mode: REDACTED
  query_relaxation: true

security_overlay:
  access_control: enhanced
  logging: enhanced
  redaction: business_sensitive_fields
  air_gap: not_required

federation_policy:
  cross_tenant_retrieval: restricted
  query_relaxation: permitted
  disclosure_mode: REDACTED
